name: Web to APK Build
on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'The URL of the website to convert'
        required: true
        default: 'https://google.com'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK
        run: |
          # 1. Update the host in your manifest
          DOMAIN=$(echo "${{ github.event.inputs.site_url }}" | sed -e 's|^[^/]*//||' -e 's|/.*$||')
          sed -i "s/google.com/$DOMAIN/g" twa-manifest.json
          
          # 2. MANUALLY SET THE SDK PATH
          # On GitHub Runners, the SDK is always at /usr/local/lib/android/sdk
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"/usr/local/lib/android/sdk\"}" > ~/.bubblewrap/config.json
          
          # 3. Build the APK using the forced configuration
          bubblewrap build --skipSigning --yes
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Generated-APK
          path: ./*.apk
