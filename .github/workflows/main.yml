name: Web to APK Build
on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'The URL of the website to convert'
        required: true
        default: 'https://lexicon45.blogspot.com'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure and Build APK
        run: |
          # 1. Clean the input URL to get just the domain (e.g., lexicon45.blogspot.com)
          DOMAIN=$(echo "${{ github.event.inputs.site_url }}" | sed -e 's|^[^/]*//||' -e 's|/.*$||')
          
          # 2. Replace "yourwebsite.com" everywhere in your manifest with the real domain
          sed -i "s/yourwebsite.com/$DOMAIN/g" twa-manifest.json
          
          # 3. Create a dummy keystore file so the build doesn't crash
          touch android.keystore
          
          # 4. Force the correct paths for GitHub's Android SDK
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"/usr/local/lib/android/sdk\"}" > ~/.bubblewrap/config.json
          
          # 5. Build the APK (Skip signing and prompts)
          bubblewrap build --skipSigning --yes
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Generated-APK
          path: ./*.apk
