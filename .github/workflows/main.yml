name: Web to APK Build
on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'The URL of the website to convert'
        required: true
        default: 'https://google.com'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK
        run: |
          # 1. Update the host in your existing twa-manifest.json
          DOMAIN=$(echo "${{ github.event.inputs.site_url }}" | sed -e 's|^[^/]*//||' -e 's|/.*$||')
          sed -i "s/google.com/$DOMAIN/g" twa-manifest.json
          
          # 2. Accept Android SDK Licenses automatically
          yes | bubblewrap doctor || true
          
          # 3. Build the APK (skipping the prompt for signing keys)
          bubblewrap build --skipSigning --yes
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Generated-APK
          path: ./*.apk
