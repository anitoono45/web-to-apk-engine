name: Web to APK Build
on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'The URL of the website to convert'
        required: true
        default: 'https://lexicon45.blogspot.com'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Fix Bubblewrap SDK Bug
        run: sudo mkdir -p /usr/local/lib/android/sdk/tools

      - name: Configure and Build APK
        run: |
          # 1. Clean the URL and inject it into the manifest
          DOMAIN=$(echo "${{ github.event.inputs.site_url }}" | sed -e 's|^[^/]*//||' -e 's|/.*$||')
          sed -i "s/yourwebsite.com/$DOMAIN/g" twa-manifest.json
          
          # 2. Hardcode the exact paths
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"/usr/local/lib/android/sdk\"}" > ~/.bubblewrap/config.json
          
          # 3. Create a dummy keystore
          touch android.keystore
          
          # 4. Build the APK and automatically answer "yes" to the regeneration prompt
          echo "yes" | bubblewrap build --skipSigning
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Generated-APK
          path: ./*.apk
