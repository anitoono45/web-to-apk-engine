name: Web to APK Build
on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'The URL of the website to convert'
        required: true
        default: 'https://google.com'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure and Build APK
        run: |
          # 1. Update the host in your twa-manifest.json
          DOMAIN=$(echo "${{ github.event.inputs.site_url }}" | sed -e 's|^[^/]*//||' -e 's|/.*$||')
          sed -i "s/google.com/$DOMAIN/g" twa-manifest.json
          
          # 2. Setup Bubblewrap Config (Using dynamic environment variables)
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # 3. Accept all licenses
          yes | bubblewrap doctor || true
          
          # 4. Build the APK (Forces 'yes' to all prompts)
          bubblewrap build --skipSigning --yes
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Generated-APK
          path: ./*.apk
